name: CI + Docker Hub Delivery

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests"

      - name: Build Docker image
        run: |
          docker build -t ci-test-image:latest .


  deploy:
    needs: build         # Solo se la build passa
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # Solo su main
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-demo:latest .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-demo:latest